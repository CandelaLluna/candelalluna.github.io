backend:
  name: git-gateway
  branch: main

media_folder: "imagenes"
public_folder: "/imagenes"

collections:
  - name: "escritos"
    label: "Escritos"
    folder: "escritos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "json"
    fields:
      - { label: "ID", name: "id", widget: "string", default: "{{year}}{{month}}{{day}}{{hour}}{{minute}}" }
      - { label: "Categoría", name: "cat", widget: "select", options: ["Poesía", "Relato", "Reseña", "Artículo"] }
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Fecha", name: "fecha", widget: "string", hint: "Ej: 12 de marzo de 2025" }
      - { label: "Texto", name: "texto", widget: "text" }
